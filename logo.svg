<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 80" width="160" height="80">

  <!-- Marco exterior -->
  <rect x="2" y="2" width="156" height="76" fill="none" stroke="#c9a07a" stroke-width="1"/>
  <!-- Marco interior -->
  <rect x="6" y="6" width="148" height="68" fill="none" stroke="#c9a07a" stroke-width="0.4"/>

  <!-- Iniciales F & C -->
  <text
    x="80"
    y="50"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="38"
    fill="#faf6f1"
    text-anchor="middle"
