  >F&amp;C</text>

  <!-- Línea decorativa inferior -->
  <line x1="30" y1="62" x2="130" y2="62" stroke="#c9a07a" stroke-width="0.6"/>

  <!-- Subtítulo -->
  <text
    x="80"
    y="72"
    font-family="Georgia, serif"
    font-size="6.5"
    fill="#c9a07a"
    text-anchor="middle"
    letter-spacing="3"
  >PELETERÍA</text>

</svg>
